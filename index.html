<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <script>
    const user = JSON.parse(localStorage.getItem('prepfast_user') || 'null');
    if (!user) { window.location.replace('register.html'); }
    // else if (user.role === 'admin') { window.location.replace('admin.html'); } // admin allowed to preview
    else if (user.role === 'teacher') { window.location.replace('teacher.html'); }
    else if (user.role === 'parent') { window.location.replace('parent.html'); }
    // student role or admin role falls through and loads normally
  </script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <meta charset="UTF-8">
  <script src="theme.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- SEO Optimization Metadata -->
  <title>ExamEdge — Past Questions & Exam Readiness CBT Prep Platform</title>
  <meta name="description" content="Prepare for WAEC, NECO, and JAMB secondary school exams in Nigeria. Features timed mock exams, study practice modes, color-coded weakness heatmaps, live exam readiness scoring, and fully offline-first PWA compatibility.">
  <meta name="keywords" content="ExamEdge, WAEC past questions, JAMB CBT mock, NECO, secondary school Nigeria, exam readiness, uLesson, prep50, edtech Africa, online learning">
  <meta name="author" content="ExamEdge Team">
  <link rel="canonical" href="https://examedge.app">

  <!-- Manifest and PWA Icons -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0b0f19">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- CDNs (Tailwind CSS, Outfit & Inter Fonts) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              purple: '#4f46e5',
              violet: '#6366f1',
              amber: '#f59e0b',
              emerald: '#10b981',
              rose: '#f43f5e',
            }
          }
        }
      }
    }
  </script>

  <!-- Premium Styles -->
  <link rel="stylesheet" href="index.css">
</head>
<body class="auth-view bg-[#0b0f19] text-[#f1f0f7] min-h-screen flex flex-col">

  <!-- 1. SMS Banner Notification Simulator Container (Floated Notification) -->
  <div id="sms-banner-container" class="fixed top-0 left-0 w-full z-[99999] flex flex-col gap-1"></div>

  <!-- 2. Main App Core Layout Shell -->
  <div class="flex flex-1 flex-col lg:flex-row min-h-screen">
    
    <!-- Desktop Sidebar Panel Navigation -->
    <aside id="sidebar-nav" class="hidden lg:flex flex-col w-64 bg-[#111827] border-r border-indigo-950/50 p-6 justify-between select-none">
      <div>
        <!-- Logo Brand -->
        <div id="nav-logo-btn" class="flex items-center gap-3 mb-10 cursor-pointer group">
          <div class="bg-indigo-600/20 p-2.5 rounded-xl border border-indigo-500/25 group-hover:border-indigo-400 transition-all text-indigo-400">
            <i data-lucide="graduation-cap" class="ee-icon-lg"></i>
          </div>
          <div>
            <h1 class="text-lg font-black tracking-tight text-white font-display">PrepFast</h1>
            <span class="text-[10px] text-indigo-400/60 uppercase tracking-widest font-bold font-display">WAEC / JAMB prep</span>
          </div>
        </div>

        <!-- Navigation Links -->
        <nav class="flex flex-col gap-2">
          <button data-view="dashboard" onclick="navigate('dashboard')" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold border-l-2 border-transparent transition-all hover:bg-indigo-950/20 hover:text-white">
            <i data-lucide="layout-dashboard" class="ee-icon"></i> Smart Study Home
          </button>
          
          <button data-view="practice" onclick="navigate('practice')" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold border-l-2 border-transparent transition-all hover:bg-indigo-950/20 hover:text-white">
            <i data-lucide="clipboard-list" class="ee-icon"></i> Practice CBT Engine
          </button>

          <button data-view="leaderboard" onclick="navigate('leaderboard')" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold border-l-2 border-transparent transition-all hover:bg-indigo-950/20 hover:text-white">
            <i data-lucide="trophy" class="ee-icon"></i> Leaderboard
          </button>

          <button data-view="wellbeing" onclick="navigate('wellbeing')" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold border-l-2 border-transparent transition-all hover:bg-indigo-950/20 hover:text-white">
            <i data-lucide="heart-pulse" class="ee-icon"></i> Wellbeing Corner
          </button>

          <button data-view="study-planner" onclick="navigate('study-planner')" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold border-l-2 border-transparent transition-all hover:bg-indigo-950/20 hover:text-white">
            <i data-lucide="calendar-days" class="ee-icon"></i> Study Planner
          </button>

          <button data-view="settings" onclick="navigate('settings')" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold border-l-2 border-transparent transition-all hover:bg-indigo-950/20 hover:text-white">
            <i data-lucide="settings" class="ee-icon"></i> Settings & Upgrade
          </button>

          <script>
            if (typeof hasRole === 'function' && hasRole('admin')) {
              document.write('<a href="admin.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold text-gray-400 hover:bg-rose-950/20 hover:text-rose-400 border-l-2 border-transparent transition-all"><i data-lucide="shield" class="ee-icon"></i> Admin Panel</a>');
            }
          </script>
          
          <button onclick="handleLogout ? handleLogout() : (typeof triggerAppLogout === 'function' ? triggerAppLogout() : ExamEdgeDB.logout())" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold border-l-2 border-transparent transition-all hover:bg-rose-950/20 text-rose-400 hover:text-rose-300 w-full text-left mt-2 border-t border-indigo-900/30 pt-4">
            <i data-lucide="log-out" class="ee-icon"></i> Logout
          </button>
        </nav>
      </div>

      <!-- App developer credit/brand bottom -->
      <div class="pt-6 border-t border-indigo-900/30 text-[10px] text-gray-500 font-medium">
        <span>ExamEdge PWA v1.0.0</span><br>
        <span class="opacity-60 block mt-1">Nigeria Premium EdTech</span>
      </div>
    </aside>

    <!-- Mobile Top Navigation Header -->
    <header id="mobile-header" class="flex lg:hidden bg-[#111827] border-b border-indigo-950/50 px-6 py-4 flex justify-between items-center z-40 select-none">
      <div class="flex items-center gap-2 text-indigo-400" onclick="navigate('dashboard')">
        <i data-lucide="graduation-cap" class="ee-icon-lg"></i>
        <h1 class="text-base font-black tracking-tight text-white font-display">PrepFast</h1>
      </div>
      <div class="flex items-center gap-3">
        <span class="text-xs font-bold px-2.5 py-1 bg-amber-500/10 text-amber-400 border border-amber-500/20 rounded-lg flex items-center gap-1"><i data-lucide="flame" class="w-3.5 h-3.5"></i> Streak</span>
      </div>
    </header>
 
    <!-- 3. Primary SPA Views Target Container -->
    <main class="flex-1 p-6 md:p-8 lg:p-10 overflow-y-auto max-w-5xl mx-auto w-full pb-24 lg:pb-10">
      
      <!-- Screen 1: Auth Screen (Phone OTP Verification) -->
      <section id="view-auth" class="app-view hidden"></section>
 
      <!-- Screen 2: Student Smart Study Home Dashboard -->
      <section id="view-dashboard" class="app-view hidden"></section>
 
      <!-- Screen 3: Practice Engine Parameters Picker -->
      <section id="view-practice" class="app-view hidden"></section>
 
      <!-- Screen 4: Active Practicing CBT / Study Interface -->
      <section id="view-practice-active" class="app-view hidden"></section>
 
      <!-- Screen 5: Leaderboards -->
      <section id="view-leaderboard" class="app-view hidden"></section>
 
      <!-- Screen 6: Wellbeing Relaxation & Mood Corner -->
      <section id="view-wellbeing" class="app-view hidden"></section>
 
      <!-- Screen 7: Settings & Payments Controls -->
      <section id="view-settings" class="app-view hidden"></section>
 
      <!-- Screen 8: AI Study Planner (Phase 2) -->
      <section id="view-study-planner" class="app-view hidden"></section>
 
    </main>
 
    <!-- Mobile Floating Bottom Navigation Bar -->
    <nav id="bottom-nav" class="flex lg:hidden fixed bottom-0 left-0 w-full bg-[#111827] border-t border-indigo-950/50 py-3 px-4 flex justify-around items-center z-50 select-none shadow-2xl">
      <button onclick="navigate('dashboard')" class="flex flex-col items-center gap-1 text-[10px] font-bold text-gray-400">
        <i data-lucide="layout-dashboard" class="ee-icon-lg"></i> Home
      </button>
      <button onclick="navigate('practice')" class="flex flex-col items-center gap-1 text-[10px] font-bold text-gray-400">
        <i data-lucide="clipboard-list" class="ee-icon-lg"></i> Practice
      </button>
      <button onclick="navigate('leaderboard')" class="flex flex-col items-center gap-1 text-[10px] font-bold text-gray-400">
        <i data-lucide="trophy" class="ee-icon-lg"></i> Rank
      </button>
      <button onclick="navigate('wellbeing')" class="flex flex-col items-center gap-1 text-[10px] font-bold text-gray-400">
        <i data-lucide="heart-pulse" class="ee-icon-lg"></i> Peace
      </button>
      <button onclick="navigate('settings')" class="flex flex-col items-center gap-1 text-[10px] font-bold text-gray-400">
        <i data-lucide="settings" class="ee-icon-lg"></i> Settings
      </button>
    </nav>
  </div>
 
  <!-- ---------------------------------------------------- -->
  <!-- 4. FLOATED WIDGETS & MODAL BOXES -->
  <!-- ---------------------------------------------------- -->
 
  <!-- A. Floating Simulated Paystack Overlay Modal -->
  <div id="paystack-sim-overlay" class="fixed inset-0 bg-[#06040c]/85 backdrop-blur-md z-[9999] hidden items-center justify-center p-4"></div>
 
  <!-- B. Floating WhatsApp Study Bot Widget -->
  <div class="fixed bottom-20 lg:bottom-6 right-6 z-[90] select-none flex flex-col items-end">
    
    <!-- WhatsApp Floating Panel -->
    <div id="whatsapp-panel" class="hidden w-80 max-w-[90vw] h-96 glass-panel rounded-2xl border border-emerald-500/20 shadow-2xl overflow-hidden flex flex-col mb-3 bg-[#0d1418] relative">
      
      <!-- Panel Header -->
      <div class="bg-[#202c33] p-4 flex items-center justify-between border-b border-[#2f3b43]">
        <div class="flex items-center gap-3">
          <div class="w-9 h-9 rounded-full bg-emerald-500/20 border border-emerald-500/30 flex items-center justify-center text-base">
            <i data-lucide="brain" class="w-5 h-5 text-emerald-400"></i>
          </div>
          <div>
            <h4 class="text-xs font-bold text-white leading-none">PrepFast WhatsApp Bot</h4>
            <span class="text-[9px] text-emerald-400 font-semibold leading-none mt-1 block">● Study Bot Online</span>
          </div>
        </div>
        <button onclick="toggleWhatsApp()" class="text-gray-400 hover:text-white font-bold text-base px-2">&times;</button>
      </div>

      <!-- Messages Content Box -->
      <div id="whatsapp-msg-box" class="flex-1 p-4 overflow-y-auto bg-[#0b141a] flex flex-col"></div>

      <!-- Footer Message Input bar -->
      <div class="bg-[#202c33] p-2 flex items-center gap-2 border-t border-[#2f3b43]">
        <input type="text" id="whatsapp-input-field" placeholder="Reply A, B, C, or D..." class="flex-1 bg-[#2a3942] border border-transparent rounded-xl px-4 py-2 text-xs text-white placeholder-gray-500 outline-none focus:border-emerald-500 font-semibold">
        <button onclick="sendWhatsAppMessage()" class="w-8 h-8 rounded-full bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-bold flex items-center justify-center text-xs transition-all">
          <i data-lucide="message-circle" class="w-4 h-4 text-slate-950"></i>
        </button>
      </div>

    </div>

    <!-- Floating Chat circle button -->
    <button id="whatsapp-widget" onclick="toggleWhatsApp()" class="w-14 h-14 bg-emerald-500 hover:bg-emerald-600 text-slate-950 rounded-full flex items-center justify-center shadow-lg shadow-emerald-500/10 hover:shadow-emerald-500/30 transition-all outline-none border-2 border-emerald-400/40 floating">
      <i data-lucide="message-circle" class="w-7 h-7"></i>
    </button>
  </div>

  <!-- C. Toast Alerts Container (Floats bottom-left) -->
  <div id="toast-container" class="fixed bottom-20 lg:bottom-6 left-6 z-[9999] flex flex-col gap-2 pointer-events-none"></div>

  <!-- ---------------------------------------------------- -->
  <!-- 5. JAVASCRIPT LOGIC LOADER -->
  <!-- ---------------------------------------------------- -->
  <script src="icons.js"></script>
  <script src="prepfast-config.js"></script>
  <script src="prepfast-api.js"></script>
  <script src="questions.js"></script>
  <script src="database.js"></script>
  <script src="prepfast-bridge.js"></script>
  <script src="app.js"></script>
  <script src="prepfast-features.js"></script>

  <!-- PWA Service Worker Registration -->
  <script>
    document.addEventListener('DOMContentLoaded', () => refreshIcons());
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js')
          .then(reg => console.log('Service Worker registered successfully!', reg.scope))
          .catch(err => console.log('Service Worker registration failed!', err));
      });
    }
  </script>

</body>
</html>
